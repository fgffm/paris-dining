name: Refresh Restaurant Cache

on:
  # Run on the 1st of every month at 06:00 UTC
  schedule:
    - cron: '0 6 1 * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate restaurant cache
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-cache.js

      - name: Commit and push updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add restaurants.json
          git diff --staged --quiet || git commit -m "chore: refresh restaurant cache $(date -u '+%Y-%m-%d')"
          git push
